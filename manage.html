<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Tabify — Excluded Sites</title>
	<link rel="stylesheet" href="theme.css" />
	<link rel="stylesheet" href="manage.css" />
</head>

<body>
	<main class="page">
		<header class="page-header">
			<span class="brand page-wordmark">Tabify</span>
			<h1 class="page-title">Excluded sites</h1>
			<p class="page-sub">Tabify won’t close duplicate tabs for the sites listed here.</p>
		</header>

		<div class="toolbar">
			<div class="search">
				<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
					stroke-linecap="round" stroke-linejoin="round">
					<circle cx="11" cy="11" r="7" />
					<path d="m20 20-3.5-3.5" />
				</svg>
				<input id="search" class="field search-input" type="search" placeholder="Search sites"
					autocomplete="off" />
			</div>
			<button id="addBtn" class="btn btn-primary">
				<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2"
					stroke-linecap="round" stroke-linejoin="round">
					<path d="M12 5v14M5 12h14" />
				</svg>
				Add site
			</button>
		</div>

		<form id="addForm" class="add-form" hidden>
			<input id="addInput" class="field" type="text" placeholder="example.com" autocomplete="off"
				spellcheck="false" />
			<button type="submit" class="btn btn-primary">Add</button>
			<button type="button" id="addCancel" class="btn btn-tinted">Cancel</button>
			<span id="addError" class="add-error" role="alert"></span>
		</form>

		<section class="card list-card">
			<div id="rows" class="group" role="list"></div>
			<div id="empty" class="empty-state" hidden>
				<svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6"
					stroke-linecap="round" stroke-linejoin="round">
					<path d="M3 13h4l2 3h6l2-3h4" />
					<path d="M5 13 7 5h10l2 8v5a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z" />
				</svg>
				<p class="empty-title">No excluded sites</p>
				<p class="empty-sub">Add a site above, or open Tabify on any page and turn on “Ignore this site”.</p>
			</div>
		</section>

		<div class="page-footer">
			<span id="countLabel" class="muted">Loading…</span>
			<button id="clearAllBtn" class="btn btn-destructive">Clear all</button>
		</div>
	</main>

	<div id="toast" class="toast" hidden>
		<span id="toastMsg"></span>
		<button id="toastUndo" class="toast-undo">Undo</button>
	</div>

	<script src="manage.js"></script>
</body>

</html>
